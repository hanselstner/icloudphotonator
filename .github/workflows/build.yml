name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run python -m pytest tests/ -q

  build:
    needs: test
    runs-on: macos-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync
      - name: Build app
        run: uv run pyinstaller --noconfirm --clean iCloudPhotonator.spec
      - name: Create ZIP
        run: cd dist && zip -r ../iCloudPhotonator-macos.zip iCloudPhotonator.app
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: iCloudPhotonator-macos.zip

